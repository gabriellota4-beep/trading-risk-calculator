<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Risk Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Trading Risk Calculator</h1>

        <label>Account Size ($)</label>
        <input type="number" id="account" placeholder="e.g. 5000">

        <label>Risk (%)</label>
        <input type="number" id="risk" placeholder="e.g. 1">

        <label>Stop Loss (points)</label>
        <input type="number" id="stop" placeholder="e.g. 50">

        <button onclick="calculate()">Calculate</button>

        <div id="result"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
